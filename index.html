<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> GitHub Issues Tracker </title>

    <script src="https://kit.fontawesome.com/098ac757b3.js" crossorigin="anonymous"></script>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <section id="signin-section">
        <div class="login-container w-[29%] mx-auto p-8 mt-16 shadow-xl">
            <div class="logo-container">
                <div class="">
                    <img class="mx-auto" src="./assets/github-logo.png" alt="logo-Image">
                </div>

                <div class="text-center">
                    <h1 class="text-2xl font-semibold"> GitHub Issues Tracker </h1>
                    <p class="text-sm text-[#64748b]"> Sign in to manage your issues </p>
                </div>

            </div>

            <div class="fieldset border-base-300 w-full border ">

                <label class="label">Username</label>
                <input id="username" type="email" class="input w-full" placeholder="Enter Username" />

                <label class="label">Password</label>
                <input id="password" type="password" class="input w-full" placeholder="Password" />

                <button id="signin-btn" class="btn bg-[#4a00ff] mt-4 text-white">Sign In</button>
            </div>

            <div class="">
                <div class="divider my-6"> OR </div>
            </div>
            <div class="text-center">
                <p class="text-[#64748b] text-sm">Demo Credential</p>
                <div class="p-6 bg-[#f8fafc]">
                    <p><span class="font-medium"> Username:</span> admin</p>
                    <p><span class="font-medium"> Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </section>



    <section id="all-card-section" class="hidden">

    </section>




    <script src="index.js"></script>
</body>

</html>
